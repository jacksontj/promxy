name: release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build release binaries
        run: make release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*
          draft: false
          prerelease: false
          generate_release_notes: true
